<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wingman Suite Showoff Cut v2</title>
  <style>
    :root {
      --bg: #07110d;
      --ink: #f8f5e8;
      --muted: #c9d2c8;
      --line: rgba(248, 245, 232, 0.18);
      --green: #1f7a61;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 10%, rgba(31, 122, 97, 0.3), transparent 30%),
        linear-gradient(145deg, #07110d 0%, #0f2118 54%, #171914 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    main {
      width: min(1420px, calc(100vw - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0 30px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
    }

    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--bg);
      font-family: Impact, Arial Black, sans-serif;
      font-size: 22px;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.28);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      padding: 14px;
    }

    video {
      display: block;
      width: 100%;
      max-height: calc(100vh - 142px);
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 6px;
      outline: 1px solid rgba(248, 245, 232, 0.16);
    }

    a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(248, 245, 232, 0.45);
    }

    .downloads {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: flex-end;
    }

    .runtime {
      color: var(--ink);
    }

    @media (max-width: 720px) {
      main {
        width: min(100vw - 16px, 1420px);
        padding: 10px 0 16px;
      }

      header,
      footer {
        align-items: flex-start;
        flex-direction: column;
        font-size: 11px;
      }

      .stage {
        padding: 8px;
      }

      video {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main data-artifact-node-id="wingman-showoff-v2">
    <header data-artifact-node-id="video-header">
      <div class="brand"><span class="mark">W</span><span>Wingman Suite / Showoff Cut v2</span></div>
      <span class="runtime">02:00</span>
    </header>

    <section class="stage" data-artifact-node-id="video-stage">
      <video
        data-artifact-node-id="showoff-video"
        src="./wingman-suite-showoff-v2.mp4"
        poster="./poster.png"
        controls
        autoplay
        muted
        playsinline
        preload="metadata"
      ></video>
    </section>

    <footer data-artifact-node-id="video-footer">
      <span>68 fast cuts. Max message hold: 1.76s.</span>
      <div class="downloads">
        <a href="./wingman-suite-showoff-v2.mp4" download>Download MP4</a>
        <a data-artifact-node-id="download-artifact-zip" href="./artifact-download.zip" download>Download Artifact ZIP</a>
      </div>
    </footer>
  </main>
</body>
</html>
