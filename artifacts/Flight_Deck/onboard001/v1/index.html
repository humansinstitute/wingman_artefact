<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight Deck Onboarding v1</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="phone" data-artifact-node-id="v1-shell">
    <section class="hero" data-artifact-node-id="v1-hero">
      <p class="eyebrow">Wingman Flight Deck</p>
      <h1>Start from the thread that matters.</h1>
      <p>Tasks, documents, and agent work stay tied to the conversation that created them.</p>
    </section>
    <section class="steps" data-artifact-node-id="v1-steps">
      <article>
        <strong>1</strong>
        <span>Pick a workspace and channel.</span>
      </article>
      <article>
        <strong>2</strong>
        <span>Attach a document or task brief.</span>
      </article>
      <article>
        <strong>3</strong>
        <span>Dispatch the right agent.</span>
      </article>
    </section>
    <button data-artifact-node-id="v1-primary-action">Open Flight Deck</button>
  </main>
</body>
</html>
